# ops/alerts/api-alerts.yml · golden-signals alerts for the API/admin-api (PrometheusRule, kube-prometheus-stack).
# Series: up (target health) + kube-state/cAdvisor (restarts/mem) + our app summaries (dep_call, *_count with ok).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: krishiverse-api-alerts
  namespace: monitoring
  labels: { release: kube-prometheus-stack }
spec:
  groups:
    - name: api.availability
      rules:
        - alert: ApiTargetDown
          expr: up{namespace="krishiverse", job=~"api|admin-api|wallet-service|realtime-gateway|ai-services"} == 0
          for: 2m
          labels: { severity: page }
          annotations:
            summary: "{{ $labels.job }} target down"
            description: "{{ $labels.job }}/{{ $labels.pod }} has been unreachable for 2m."
            runbook: ops/runbooks/production-down.md
        - alert: ApiPodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total{namespace="krishiverse"}[10m]) > 3
          for: 5m
          labels: { severity: page }
          annotations: { summary: "{{ $labels.pod }} crash-looping", runbook: ops/runbooks/production-down.md }
        - alert: ApiHighMemory
          expr: |
            max by (pod) (container_memory_working_set_bytes{namespace="krishiverse",container!=""})
              / max by (pod) (kube_pod_container_resource_limits{namespace="krishiverse",resource="memory"}) > 0.9
          for: 10m
          labels: { severity: ticket }
          annotations: { summary: "{{ $labels.pod }} >90% memory limit (OOM risk)" }
    - name: api.dependencies
      rules:
        # dep_failure / dep_call are emitted by core/resilience for every external dependency.
        - alert: DependencyErrorRateHigh
          expr: |
            sum by (dep) (increase(dep_failure{namespace="krishiverse"}[5m]))
              / clamp_min(sum by (dep) (increase(dep_call_count{namespace="krishiverse"}[5m])), 1) > 0.1
          for: 5m
          labels: { severity: page }
          annotations:
            summary: "dependency {{ $labels.dep }} error rate >10%"
            description: "Circuit breaker likely open. One hung dependency must not cascade (Law 12)."
        - alert: DependencyLatencyP99High
          expr: max by (dep) (dep_call{namespace="krishiverse",quantile="0.99"}) > 3000
          for: 10m
          labels: { severity: ticket }
          annotations: { summary: "dependency {{ $labels.dep }} p99 > 3s" }
