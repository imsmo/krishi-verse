name: CI
on: { pull_request: {}, push: { branches: [main, dev] } }
jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres: { image: postgres:16, env: { POSTGRES_PASSWORD: ci }, ports: ["5432:5432"] }
      redis: { image: redis:7, ports: ["6379:6379"] }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: bash tools/scripts/verify-structure.sh
      - run: pnpm lint                      # includes tenant-guard custom rule
      - run: pnpm build
      - run: node db/scripts/migrate.js --env ci
      - run: pnpm test                      # unit + integration
      - run: pnpm --filter api test:tenant-isolation   # cross-tenant attempts MUST fail
      - run: pnpm --filter api test:ledger-invariants  # zero-sum + append-only checks
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npx audit-ci --high
