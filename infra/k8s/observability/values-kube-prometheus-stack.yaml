# infra/k8s/observability/values-kube-prometheus-stack.yaml · lean self-hosted Prometheus+Grafana+Alertmanager.
# helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack -n monitoring -f <this>
prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: 40GB
    resources: { requests: { cpu: 250m, memory: 1Gi }, limits: { memory: 2Gi } }
    storageSpec:
      volumeClaimTemplate: { spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 50Gi } } } }
    # discover ServiceMonitors/PrometheusRules cluster-wide (not just helm-release-labeled)
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
grafana:
  defaultDashboardsEnabled: true
  adminPassword: ""        # set via existingSecret in prod; never inline
  sidecar:
    dashboards: { enabled: true, label: grafana_dashboard, searchNamespace: monitoring }
alertmanager:
  alertmanagerSpec:
    resources: { requests: { cpu: 50m, memory: 128Mi }, limits: { memory: 256Mi } }
