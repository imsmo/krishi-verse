# infra/k8s/observability/servicemonitor.yaml · scrape every krishiverse service's /metrics endpoint.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: krishiverse-services
  namespace: monitoring
  labels: { release: kube-prometheus-stack }
spec:
  namespaceSelector: { matchNames: [krishiverse] }
  selector:
    matchLabels: { app.kubernetes.io/part-of: krishi-verse }   # set by the Helm library chart labels
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
