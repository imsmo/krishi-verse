# infra/k8s/external-secrets/api.yaml · sync AWS Secrets Manager -> k8s Secret krishiverse-api-env (consumed by the api chart)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-env
  namespace: krishiverse
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: krishiverse-api-env
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: krishiverse-prod/api/env   # a JSON secret in Secrets Manager holding every env var for this service
