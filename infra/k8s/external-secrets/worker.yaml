# infra/k8s/external-secrets/worker.yaml · sync AWS Secrets Manager -> k8s Secret krishiverse-worker-env (consumed by the worker chart)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: worker-env
  namespace: krishiverse
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: krishiverse-worker-env
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: krishiverse-prod/worker/env   # a JSON secret in Secrets Manager holding every env var for this service
