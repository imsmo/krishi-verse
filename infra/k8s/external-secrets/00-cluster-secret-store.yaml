# infra/k8s/external-secrets/00-cluster-secret-store.yaml
# Tells the External Secrets Operator how to read AWS Secrets Manager. Auth is via the external-dns/ESO
# IRSA role's pod identity (jwt) — NO static AWS keys. Region = ap-south-1 (Mumbai).
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets         # the ESO controller SA (annotated with an IRSA role that can read krishiverse-prod/*)
            namespace: external-secrets
