# infra/k8s/external-secrets/wallet-service.yaml · sync AWS Secrets Manager -> k8s Secret krishiverse-wallet-env (consumed by the wallet-service chart)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wallet-service-env
  namespace: krishiverse
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: krishiverse-wallet-env
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: krishiverse-prod/wallet/env   # a JSON secret in Secrets Manager holding every env var for this service
