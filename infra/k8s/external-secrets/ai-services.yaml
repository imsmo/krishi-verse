# infra/k8s/external-secrets/ai-services.yaml · sync AWS Secrets Manager -> k8s Secret krishiverse-ai-env (consumed by the ai-services chart)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ai-services-env
  namespace: krishiverse
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: krishiverse-ai-env
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: krishiverse-prod/ai/env   # a JSON secret in Secrets Manager holding every env var for this service
