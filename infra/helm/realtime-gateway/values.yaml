# infra/helm/realtime-gateway/values.yaml · WebSocket gateway. Sticky sessions; JWT must match the API.
# COMPLETE value set (library-chart defaults do NOT propagate to a parent, so all keys live here).
nameOverride: ''
fullnameOverride: ''
image:
  repository: REPLACE_ECR/krishiverse-realtime-gateway
  tag: latest
  pullPolicy: IfNotPresent
replicaCount: 2
revisionHistoryLimit: 5
service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 8090
  grpc: false
  sessionAffinity: ClientIP
serviceAccount:
  create: true
  name: ''
  roleArn: REPLACE_IRSA_REALTIME_ROLE_ARN
env:
- name: NODE_ENV
  value: production
- name: REALTIME_PORT
  value: '8090'
- name: JWT_ISSUER
  value: krishi-verse
- name: JWT_AUDIENCE
  value: krishi-verse-app
- name: RT_MAX_SUBSCRIPTIONS
  value: '50'
- name: RT_MAX_BUFFERED_BYTES
  value: '1000000'
- name: RT_MAX_QUEUED_MESSAGES
  value: '100'
- name: LOG_LEVEL
  value: info
envFromSecretNames:
- krishiverse-realtime-env
secretEnv: []
command: []
args: []
livenessProbe:
  type: http
  path: /healthz
  initialDelaySeconds: 20
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3
readinessProbe:
  type: http
  path: /healthz
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
pdb:
  enabled: true
  minAvailable: 1
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
    - ALL
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints:
- maxSkew: 1
  topologyKey: topology.kubernetes.io/zone
  whenUnsatisfiable: ScheduleAnyway
  labelSelector: {}
extraVolumes: []
extraVolumeMounts: []
ingress:
  enabled: true
  className: alb
  groupName: krishiverse-edge
  certArn: REPLACE_ACM_CERT_ARN
  wafArn: REPLACE_WAF_ACL_ARN
  healthcheckPath: /healthz
  hosts:
  - rt.krishiverse.ai
  annotations:
    alb.ingress.kubernetes.io/target-group-attributes: stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=3600
