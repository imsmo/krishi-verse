# infra/helm/api/values.yaml · krishiverse api (REST). Secrets via k8s Secret krishiverse-api-env (synced from AWS Secrets Manager).
# COMPLETE value set (library-chart defaults do NOT propagate to a parent, so all keys live here).
nameOverride: ''
fullnameOverride: ''
image:
  repository: REPLACE_ECR/krishiverse-api
  tag: latest
  pullPolicy: IfNotPresent
replicaCount: 2
revisionHistoryLimit: 5
service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 3000
  grpc: false
  sessionAffinity: ''
serviceAccount:
  create: true
  name: ''
  roleArn: REPLACE_IRSA_API_ROLE_ARN
env:
- name: NODE_ENV
  value: production
- name: PORT
  value: '3000'
- name: JWT_ISSUER
  value: krishi-verse
- name: JWT_AUDIENCE
  value: krishi-verse-app
- name: SHARD_COUNT
  value: '1'
- name: DATABASE_POOL_MAX
  value: '20'
- name: LOG_LEVEL
  value: info
envFromSecretNames:
- krishiverse-api-env
secretEnv: []
command: []
args: []
livenessProbe:
  type: http
  path: /healthz
  initialDelaySeconds: 20
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3
readinessProbe:
  type: http
  path: /healthz
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
resources:
  requests:
    cpu: 150m
    memory: 384Mi
  limits:
    memory: 768Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
pdb:
  enabled: true
  minAvailable: 1
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
    - ALL
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints:
- maxSkew: 1
  topologyKey: topology.kubernetes.io/zone
  whenUnsatisfiable: ScheduleAnyway
  labelSelector: {}
extraVolumes: []
extraVolumeMounts: []
ingress:
  enabled: true
  className: alb
  groupName: krishiverse-edge
  certArn: REPLACE_ACM_CERT_ARN
  wafArn: REPLACE_WAF_ACL_ARN
  healthcheckPath: /healthz
  hosts:
  - api.krishiverse.ai
  annotations: {}
