# infra/helm/admin-api/values.yaml · admin-api (elevated control plane).
# COMPLETE value set (library-chart defaults do NOT propagate to a parent, so all keys live here).
nameOverride: ''
fullnameOverride: ''
image:
  repository: REPLACE_ECR/krishiverse-admin-api
  tag: latest
  pullPolicy: IfNotPresent
replicaCount: 2
revisionHistoryLimit: 5
service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 4001
  grpc: false
  sessionAffinity: ''
serviceAccount:
  create: true
  name: ''
  roleArn: REPLACE_IRSA_ADMIN_API_ROLE_ARN
env:
- name: NODE_ENV
  value: production
- name: ADMIN_PORT
  value: '4001'
- name: JWT_ISSUER
  value: krishi-verse-admin
- name: JWT_AUDIENCE
  value: krishi-verse-admin
- name: LOG_LEVEL
  value: info
envFromSecretNames:
- krishiverse-admin-api-env
secretEnv: []
command: []
args: []
livenessProbe:
  type: http
  path: /healthz
  initialDelaySeconds: 20
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3
readinessProbe:
  type: http
  path: /healthz
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
pdb:
  enabled: true
  minAvailable: 1
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
    - ALL
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints:
- maxSkew: 1
  topologyKey: topology.kubernetes.io/zone
  whenUnsatisfiable: ScheduleAnyway
  labelSelector: {}
extraVolumes: []
extraVolumeMounts: []
ingress:
  enabled: true
  className: alb
  groupName: krishiverse-edge
  certArn: REPLACE_ACM_CERT_ARN
  wafArn: REPLACE_WAF_ACL_ARN
  healthcheckPath: /healthz
  hosts:
  - admin-api.krishiverse.ai
  annotations: {}
