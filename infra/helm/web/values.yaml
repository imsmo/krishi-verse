# infra/helm/web/values.yaml · GENERIC Next.js chart. One release per app (override image+env). NEXT_PUBLIC_* are baked at build.
# COMPLETE value set (library-chart defaults do NOT propagate to a parent, so all keys live here).
nameOverride: ''
fullnameOverride: ''
image:
  repository: REPLACE_ECR/krishiverse-web-storefront
  tag: latest
  pullPolicy: IfNotPresent
replicaCount: 2
revisionHistoryLimit: 5
service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 3000
  grpc: false
  sessionAffinity: ''
serviceAccount:
  create: true
  name: ''
  roleArn: ''
env:
- name: NODE_ENV
  value: production
- name: PORT
  value: '3000'
envFromSecretNames: []
secretEnv: []
command: []
args: []
livenessProbe:
  type: tcp
  path: ''
  initialDelaySeconds: 20
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3
readinessProbe:
  type: tcp
  path: ''
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
pdb:
  enabled: true
  minAvailable: 1
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
    - ALL
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints:
- maxSkew: 1
  topologyKey: topology.kubernetes.io/zone
  whenUnsatisfiable: ScheduleAnyway
  labelSelector: {}
extraVolumes: []
extraVolumeMounts: []
ingress:
  enabled: true
  className: alb
  groupName: krishiverse-edge
  certArn: REPLACE_ACM_CERT_ARN
  wafArn: REPLACE_WAF_ACL_ARN
  healthcheckPath: /
  hosts:
  - krishiverse.ai
  - www.krishiverse.ai
  annotations: {}
